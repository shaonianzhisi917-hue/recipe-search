      return value
        .normalize("NFKC")
        .replace(/[⻰⻩⻘⻆⻣⻄⻉⻛]/g, char => charMap[char] || char)
        .toLowerCase();
    }

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function tokenize(value) {
      return normalize(value).trim().split(/\s+/).filter(Boolean);
    }

    function highlight(text, terms) {
      let safe = escapeHtml(text);
      for (const term of terms) {
        if (!term) continue;
        safe = safe.replace(new RegExp(escapeRegExp(term), "gi"), match => `<mark>${match}</mark>`);
      }
      return safe;
    }

    function countTerm(text, term) {
      const matches = text.match(new RegExp(escapeRegExp(term), "g"));
      return matches ? matches.length : 0;
    }

    function scoreRecipe(recipe, terms) {
      const body = recipe.searchText || normalize([recipe.title, recipe.section, recipe.method, recipe.notes].join(" "));
      if (!terms.every(term => body.includes(term))) return 0;
      const title = normalize(recipe.title);
      let score = 0;
      for (const term of terms) {
        score += countTerm(body, term);
        if (title.includes(term)) score += 30;
      }
      return score;
    }

    function renderRecipe(recipe, terms) {
      const article = document.createElement("article");
      article.className = "card";
      const section = recipe.section ? `<div class="section-label">${escapeHtml(recipe.section)}</div>` : "";
      const method = recipe.method
        ? `<div class="block"><p class="block-title">原料与做法</p><p class="recipe-text">${highlight(recipe.method, terms)}</p></div>`
        : "";
      const notes = recipe.notes
        ? `<div class="block"><p class="block-title">注意事项</p><p class="recipe-text">${highlight(recipe.notes, terms)}</p></div>`
        : "";
      article.innerHTML = `
        <div class="card-head">
          <div>
            <h2 class="recipe-title">${highlight(recipe.title, terms)}</h2>
            ${section}
          </div>
          <div class="page">Markdown 原文</div>
        </div>
        ${method}
        ${notes}
      `;
      return article;
    }

    function renderEmpty(title, body) {
      results.innerHTML = "";
      empty.style.display = "block";
      empty.innerHTML = `<strong>${escapeHtml(title)}</strong><span>${escapeHtml(body)}</span>`;
    }

    function search() {
      const terms = tokenize(input.value);
      results.innerHTML = "";
      if (!terms.length) {
        status.textContent = "输入关键词开始查找";
        renderEmpty("先搜一个产品或原料", "例如：小黄油、红茶汤、果糖、柠檬。");
        return;
      }

      const recipeMatches = recipes
        .map(recipe => ({ ...recipe, score: scoreRecipe(recipe, terms) }))
        .filter(recipe => recipe.score > 0)
        .sort((a, b) => b.score - a.score || a.title.localeCompare(b.title, "zh-Hans-CN"));

      if (recipeMatches.length) {
        status.textContent = `找到 ${recipeMatches.length} 张产品卡`;
        empty.style.display = "none";
        const fragment = document.createDocumentFragment();
        recipeMatches.forEach(recipe => fragment.appendChild(renderRecipe(recipe, terms)));
        results.appendChild(fragment);
        return;
      }

      status.textContent = "没有找到相关内容";
      renderEmpty("没有命中", "换一个产品名、原料名，或减少关键词。");
    }

    suggestions.forEach(term => {
      const button = document.createElement("button");
      button.className = "chip";
      button.type = "button";
      button.textContent = term;
      button.addEventListener("click", () => {
        input.value = term;
        search();
        input.focus();
      });
      quickTerms.appendChild(button);
    });

    clearButton.addEventListener("click", () => {
      input.value = "";
      search();
      input.focus();
    });
    input.addEventListener("input", search);
  </script>
</body>
</html>
