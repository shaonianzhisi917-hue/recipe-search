  <script>
    const source = JSON.parse(document.getElementById("pdfData").textContent);
    const pages = source.pages;
    const input = document.getElementById("searchInput");
    const clearButton = document.getElementById("clearButton");
    const status = document.getElementById("status");
    const results = document.getElementById("results");
    const empty = document.getElementById("empty");
    const quickTerms = document.getElementById("quickTerms");
    const suggestions = ["红茶汤", "果糖", "柠檬", "巧克力", "绿茶汤", "牛乳"];

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function tokenize(value) {
      return value.trim().toLowerCase().split(/\s+/).filter(Boolean);
    }

    function highlight(text, terms) {
      let safe = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
      for (const term of terms) {
        safe = safe.replace(new RegExp(escapeRegExp(term), "gi"), match => `<mark>${match}</mark>`);
      }
      return safe;
    }

    function makeSnippet(text, terms) {
      const lower = text.toLowerCase();
      let first = -1;
      for (const term of terms) {
        const index = lower.indexOf(term);
        if (index !== -1 && (first === -1 || index < first)) first = index;
      }
      if (first === -1) first = 0;
      const start = Math.max(0, first - 48);
      const end = Math.min(text.length, first + 132);
      const prefix = start > 0 ? "..." : "";
      const suffix = end < text.length ? "..." : "";
      return prefix + text.slice(start, end) + suffix;
    }

    function scorePage(text, terms) {
      const lower = text.toLowerCase();
      let score = 0;
      for (const term of terms) {
        const matches = lower.match(new RegExp(escapeRegExp(term), "g"));
        if (matches) score += matches.length;
      }
      const allTerms = terms.every(term => lower.includes(term));
      return allTerms ? score : 0;
    }

    function search() {
      const terms = tokenize(input.value);
      results.innerHTML = "";
      if (!terms.length) {
        status.textContent = "输入关键词开始查找";
        empty.style.display = "block";
        return;
      }

      const matches = pages
        .map(page => ({ ...page, score: scorePage(page.text, terms) }))
        .filter(page => page.score > 0)
        .sort((a, b) => b.score - a.score || a.page - b.page);

      status.textContent = matches.length ? `找到 ${matches.length} 页相关内容` : "没有找到相关内容";
      empty.style.display = matches.length ? "none" : "block";
      if (!matches.length) {
        empty.innerHTML = "<strong>没有命中</strong><span>换一个产品名、原料名，或减少关键词。</span>";
        return;
      }

      const fragment = document.createDocumentFragment();
      matches.forEach(page => {
        const article = document.createElement("article");
        article.className = "card";
        const snippet = makeSnippet(page.text, terms);
        article.innerHTML = `
          <div class="card-head">
            <div class="page">第 ${page.page} 页</div>
            <div class="score">命中 ${page.score} 次</div>
          </div>
          <p class="snippet">${highlight(snippet, terms)}</p>
          <div class="actions">
            <button class="action" type="button" data-copy="${page.page}">复制页码</button>
          </div>
          <details>
            <summary>查看本页原文</summary>
            <div class="fulltext">${highlight(page.text, terms)}</div>
          </details>
        `;
        fragment.appendChild(article);
      });
      results.appendChild(fragment);
    }

    suggestions.forEach(term => {
      const button = document.createElement("button");
      button.className = "chip";
      button.type = "button";
      button.textContent = term;
      button.addEventListener("click", () => {
        input.value = term;
        search();
        input.focus();
      });
      quickTerms.appendChild(button);
    });

    results.addEventListener("click", async event => {
      const button = event.target.closest("[data-copy]");
      if (!button) return;
      const text = `第 ${button.dataset.copy} 页`;
      try {
        await navigator.clipboard.writeText(text);
        button.textContent = "已复制";
        setTimeout(() => button.textContent = "复制页码", 900);
      } catch {
        button.textContent = text;
      }
    });

    clearButton.addEventListener("click", () => {
      input.value = "";
      search();
      input.focus();
    });
    input.addEventListener("input", search);
  </script>
</body>
